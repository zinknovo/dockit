edition: 1.0.0
name: dockit-server
access: "default"

vars:
  region: "cn-hangzhou"
  service:
    name: "dockit-service"

services:
  dockit-api:
    component: fc
    actions:
      pre-deploy:
        - run: pip install -r requirements.txt -t .
          path: ./
    props:
      region: ${vars.region}
      service: ${vars.service}
      function:
        name: "api"
        runtime: "custom.debian10"
        codeUri: "./"
        memorySize: 1024
        timeout: 60
        customRuntimeConfig:
          command:
            - "python"
            - "-m"
            - "uvicorn"
            - "main:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "9000"
        environmentVariables:
          DATABASE_URL: "YOUR_SUPABASE_OR_RDS_URL"
          DOCKIT_SECRET: "YOUR_JWT_SECRET"
          OPENAI_API_KEY: "YOUR_DEEPSEEK_API_KEY"
          LLM_BASE_URL: "https://api.deepseek.com"
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE

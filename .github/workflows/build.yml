name: Build Client

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --extra build

      - name: Build
        run: uv run pyinstaller dockit.spec --noconfirm --clean
        env:
          PYTHONPATH: src

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockit-${{ matrix.name }}
          path: dist/dockit/

name: Build Windows Client

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra build

      - name: Run Windows Verification Tests
        run: uv run pytest tests/ -v -m "not slow" -k "not test_endpoint"
        env:
          PYTHONPATH: src

      - name: Build Executable
        run: uv run python -m PyInstaller dockit.spec --noconfirm --clean
        env:
          PYTHONPATH: src

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockit-windows-x64
          path: dist/dockit/
          if-no-files-found: error

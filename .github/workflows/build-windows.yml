name: Build Windows Client

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动点击触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv sync --extra build
          uv pip install pytest pytest-cov reportlab
          uv pip install pyinstaller customtkinter pystray Pillow pyyaml openpyxl pdfplumber python-docx openai watchdog

      - name: Run Windows Verification Tests
        shell: bash
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)/src"
          uv run pytest tests/ -v -m "not slow"

      - name: Build Executable
        shell: bash
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)/src"
          ./scripts/build-client.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockit-windows-x64
          path: dist/dockit/
          if-no-files-found: error

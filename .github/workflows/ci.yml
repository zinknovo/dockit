name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  client-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Client tests (excl. slow)
        run: uv run pytest tests/ -v -m "not slow" --tb=short

      - name: Coverage
        run: uv run pytest tests/ -m "not slow" --cov=src/dockit --cov-report=term-missing
        env:
          COVERAGE_FAIL_UNDER: "90"

  server-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install server deps
        run: uv sync

      - name: Verify server starts
        run: uv run python -c "from main import app; assert app"
